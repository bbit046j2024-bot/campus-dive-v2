[variables]
    PHP_EXTENSIONS = "mysqli, pdo_mysql, mbstring, gd, curl, openssl"

[phases.setup]
    nixPkgs = ["...", "nodejs", "php", "composer"]

[phases.install]
    dependsOn = ["setup"]
    cmds = [
        "npm install --prefix frontend",
        "composer install --no-dev --optimize-autoloader"
    ]

[phases.build]
    dependsOn = ["install"]
    cmds = [
        "npm run build --prefix frontend",
        "cp -r frontend/dist/* .",
        "mv index.html app.html"
    ]